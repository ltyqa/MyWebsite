name: Build and deploy site

on:
  schedule:
    # GitHub Actions cron uses UTC; 03:00 UTC is 11:00 in Asia/Shanghai.
    - cron: "0 3 * * *"
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types:
      - notes-updated

jobs:
  build-and-deploy:
    name: Build and deploy Astro site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@4.107.1 pages deploy dist --project-name mywebsite --branch main
        env:
          CLOUDFLARE_ACCOUNT_ID: 3aa32d2fbaf1b472486ce05da604e07f
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
