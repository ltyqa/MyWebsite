name: Build and deploy site

on:
  schedule:
    # GitHub Actions cron uses UTC; 03:00 UTC is 11:00 in Asia/Shanghai.
    - cron: "0 3 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "src/data/ai-updates.json"
  workflow_dispatch:
  repository_dispatch:
    types:
      - notes-updated

permissions:
  contents: write

concurrency:
  group: build-site-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy Astro site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect official AI updates
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: npm run collect:ai
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-chat' }}

      - name: Check
        run: npm run check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@4.107.1 pages deploy dist --project-name mywebsite --branch main
        env:
          CLOUDFLARE_ACCOUNT_ID: 3aa32d2fbaf1b472486ce05da604e07f
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Commit updated AI archive
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && success()
        run: |
          if git diff --quiet -- src/data/ai-updates.json; then
            echo "No AI update changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/ai-updates.json
          git commit -m "chore: sync official AI updates"
          git pull --rebase origin main
          git push
