services:
  qdrant:
    image: qdrant/qdrant:v1.15.4
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    mem_limit: 320m

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - qdrant
    network_mode: host
    volumes:
      - ./data:/data
    mem_limit: 700m
    cpus: 1.5
